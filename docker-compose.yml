services:
  dash:
    build: .
    container_name: dashapp
    ports:
      - "8050:8050"
    volumes:
      # Live-update data without rebuilding container
      - ./dash_data:/app/dash_data
      # Optional: live update CSS/images
      - ./assets:/app/assets
    environment:
      DASH_DEBUG: "1"
    restart: unless-stopped